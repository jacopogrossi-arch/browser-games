<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3-Headed Snake</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
      overflow: hidden;
    }

    #wrapper {
      position: relative;
    }

    canvas {
      display: block;
      border: 3px solid #0f3460;
      border-radius: 4px;
      max-width: 100vw;
    }

    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
    }

    .score-box {
      background: rgba(22, 33, 62, 0.88);
      padding: 0.35rem 1rem;
      border-radius: 8px;
    }

    .score-box .label {
      opacity: 0.65;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .score-box .value {
      font-size: 1.2rem;
      font-weight: bold;
      color: #a8dadc;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(26, 26, 46, 0.9);
      gap: 1rem;
      border-radius: 2px;
    }

    #overlay h2 {
      font-size: 2.2rem;
      color: #e94560;
      letter-spacing: 0.05em;
    }

    #overlay .subtitle {
      color: #a8dadc;
      font-size: 1rem;
    }

    #overlay .hint {
      color: #888;
      font-size: 0.8rem;
      text-align: center;
      line-height: 1.6;
    }

    #overlay button {
      margin-top: 0.5rem;
      padding: 0.7rem 2.4rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.15s, transform 0.1s;
    }

    #overlay button:hover {
      background: #c73652;
      transform: scale(1.04);
    }
  </style>
</head>
<body>
  <div id="wrapper">
    <canvas id="game"></canvas>

    <div id="hud">
      <div class="score-box">
        <div class="label">Score</div>
        <div class="value" id="score-val">0</div>
      </div>
      <div class="score-box">
        <div class="label">Best</div>
        <div class="value" id="best-val">0</div>
      </div>
    </div>

    <div id="overlay">
      <h2>3-Headed Snake</h2>
      <div class="subtitle">One body. Three heads. Total chaos.</div>
      <div class="hint">
        Arrow keys or A/D to steer<br>
        Mouse to aim (optional)
      </div>
      <button id="play-btn">Play</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const overlayTitle = overlay.querySelector('h2');
    const overlaySubtitle = overlay.querySelector('.subtitle');
    const playBtn = document.getElementById('play-btn');
    const scoreEl = document.getElementById('score-val');
    const bestEl = document.getElementById('best-val');

    const W = 900;
    const H = 700;
    canvas.width = W;
    canvas.height = H;

    const CONFIG = {
      PLAYER_SPEED: 2.8,
      AI_SPEED: 2.0,
      TURN_RATE: 0.07,
      HEAD_RADIUS: 10,
      BODY_RADIUS: 7,
      HEAD_SEPARATION: 20,
      SEGMENT_SPACING: 6,
      INITIAL_LENGTH: 80,
      GROWTH_PER_FOOD: 30,
      FOOD_COUNT: 22,
      AI_COUNT: 3,
      ARENA_PAD: 18,
      SELF_SKIP: 45,
      COLORS: {
        BG: '#1a1a2e',
        ARENA: '#16213e',
        WALL: '#0f3460',
        PLAYER_BODY: '#5db8c8',
        PLAYER_HEAD_C: '#e94560',
        PLAYER_HEAD_S: '#ff8fa3',
        FOOD: ['#e94560', '#a8dadc', '#ffd166', '#06d6a0', '#ff9f1c'],
        AI_BODY: ['#9b5de5', '#f15bb5', '#fee440'],
        AI_HEAD: ['#c77dff', '#ff77c0', '#ffe066'],
      }
    };

    // ── State ──────────────────────────────────────────────────────────────────
    let player, aiSnakes, foods, score, highScore, gameState, mouseAngle, usesMouse;
    highScore = parseInt(localStorage.getItem('snake3_hi') || '0');
    gameState = 'start';
    bestEl.textContent = highScore;

    // ── Input ──────────────────────────────────────────────────────────────────
    const keys = {};
    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
    });
    document.addEventListener('keyup', e => { keys[e.key] = false; });

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      const mx = (e.clientX - rect.left) * (W / rect.width);
      const my = (e.clientY - rect.top) * (H / rect.height);
      mouseAngle = Math.atan2(my - player.y, mx - player.x);
      usesMouse = true;
    });

    // ── Factory functions ──────────────────────────────────────────────────────
    function initTrail(x, y, angle) {
      const pts = [];
      for (let i = CONFIG.INITIAL_LENGTH - 1; i >= 0; i--) {
        pts.push({
          x: x - Math.cos(angle) * i * CONFIG.SEGMENT_SPACING,
          y: y - Math.sin(angle) * i * CONFIG.SEGMENT_SPACING
        });
      }
      return pts;
    }

    function createPlayer() {
      const angle = 0;
      return {
        x: W / 2, y: H / 2,
        angle,
        trail: initTrail(W / 2, H / 2, angle),
        targetLength: CONFIG.INITIAL_LENGTH,
        pendingGrowth: 0,
        turnInput: 0,
        alive: true,
      };
    }

    const AI_SPAWNS = [
      { x: 120,     y: 120,     angle: Math.PI * 0.25 },
      { x: W - 120, y: 120,     angle: Math.PI * 0.75 },
      { x: W / 2,   y: H - 120, angle: -Math.PI / 2  },
    ];

    function createAI(i) {
      const sp = AI_SPAWNS[i];
      return {
        x: sp.x, y: sp.y,
        angle: sp.angle,
        trail: initTrail(sp.x, sp.y, sp.angle),
        targetLength: CONFIG.INITIAL_LENGTH,
        pendingGrowth: 0,
        colorIndex: i,
        alive: true,
        avoidTimer: 0,
      };
    }

    function spawnOnePellet() {
      const pad = CONFIG.ARENA_PAD + 30;
      return {
        x: pad + Math.random() * (W - pad * 2),
        y: pad + Math.random() * (H - pad * 2),
        colorIndex: Math.floor(Math.random() * CONFIG.COLORS.FOOD.length),
        pulsePhase: Math.random() * Math.PI * 2,
      };
    }

    function spawnFood(n) {
      return Array.from({ length: n }, spawnOnePellet);
    }

    // ── Core algorithm: 3 head positions ──────────────────────────────────────
    function getHeads(snake) {
      const c = Math.cos(snake.angle);
      const s = Math.sin(snake.angle);
      const sep = CONFIG.HEAD_SEPARATION;
      const fwd = CONFIG.HEAD_RADIUS;
      return [
        { x: snake.x + c * fwd,           y: snake.y + s * fwd },           // center
        { x: snake.x + c * fwd - s * sep, y: snake.y + s * fwd + c * sep }, // left
        { x: snake.x + c * fwd + s * sep, y: snake.y + s * fwd - c * sep }, // right
      ];
    }

    // ── Trail update ───────────────────────────────────────────────────────────
    function updateTrail(snake) {
      const last = snake.trail[snake.trail.length - 1];
      const dx = snake.x - last.x;
      const dy = snake.y - last.y;
      if (Math.sqrt(dx * dx + dy * dy) >= CONFIG.SEGMENT_SPACING) {
        snake.trail.push({ x: snake.x, y: snake.y });
      }
      if (snake.pendingGrowth > 0) {
        snake.targetLength++;
        snake.pendingGrowth--;
      }
      while (snake.trail.length > snake.targetLength) {
        snake.trail.shift();
      }
    }

    // ── Movement ───────────────────────────────────────────────────────────────
    function updatePlayer() {
      if (!player.alive) return;

      if (usesMouse) {
        let diff = mouseAngle - player.angle;
        while (diff > Math.PI) diff -= 2 * Math.PI;
        while (diff < -Math.PI) diff += 2 * Math.PI;
        const maxTurn = CONFIG.TURN_RATE;
        player.angle += Math.sign(diff) * Math.min(Math.abs(diff), maxTurn);
      } else {
        player.turnInput = 0;
        if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.turnInput = -1;
        if (keys['ArrowRight'] || keys['d'] || keys['D']) player.turnInput = 1;
        player.angle += player.turnInput * CONFIG.TURN_RATE;
      }

      player.x += Math.cos(player.angle) * CONFIG.PLAYER_SPEED;
      player.y += Math.sin(player.angle) * CONFIG.PLAYER_SPEED;
      updateTrail(player);
    }

    function updateAI(ai) {
      if (!ai.alive) return;

      // Find nearest food
      let bestFood = null, bestDist = Infinity;
      for (const f of foods) {
        const d = Math.hypot(f.x - ai.x, f.y - ai.y);
        if (d < bestDist) { bestDist = d; bestFood = f; }
      }

      let desired = ai.angle;
      if (bestFood) desired = Math.atan2(bestFood.y - ai.y, bestFood.x - ai.x);

      // Wall avoidance
      const LOOKAHEAD = 90;
      const pad = CONFIG.ARENA_PAD + 40;
      const fx = ai.x + Math.cos(ai.angle) * LOOKAHEAD;
      const fy = ai.y + Math.sin(ai.angle) * LOOKAHEAD;
      if (fx < pad || fx > W - pad || fy < pad || fy > H - pad) {
        desired = Math.atan2(H / 2 - ai.y, W / 2 - ai.x);
        desired += (Math.random() - 0.5) * 0.6;
      }

      let diff = desired - ai.angle;
      while (diff > Math.PI) diff -= 2 * Math.PI;
      while (diff < -Math.PI) diff += 2 * Math.PI;
      ai.angle += Math.sign(diff) * Math.min(Math.abs(diff), CONFIG.TURN_RATE * 0.9);

      ai.x += Math.cos(ai.angle) * CONFIG.AI_SPEED;
      ai.y += Math.sin(ai.angle) * CONFIG.AI_SPEED;
      updateTrail(ai);
    }

    // ── Collision detection ────────────────────────────────────────────────────
    function checkWall(snake) {
      const pad = CONFIG.ARENA_PAD + CONFIG.HEAD_RADIUS - 2;
      const heads = getHeads(snake);
      return heads.some(h => h.x < pad || h.x > W - pad || h.y < pad || h.y > H - pad);
    }

    function checkFoodCollision(snake) {
      const heads = getHeads(snake);
      const eaten = [];
      for (let fi = foods.length - 1; fi >= 0; fi--) {
        const f = foods[fi];
        for (const h of heads) {
          if (Math.hypot(h.x - f.x, h.y - f.y) < CONFIG.HEAD_RADIUS + 7) {
            eaten.push(fi);
            break;
          }
        }
      }
      return eaten;
    }

    function checkSelfCollision(snake) {
      const heads = getHeads(snake);
      const skip = CONFIG.SELF_SKIP;
      const len = snake.trail.length;
      if (len <= skip) return false;
      for (let i = 0; i < len - skip; i++) {
        const pt = snake.trail[i];
        for (const h of heads) {
          if (Math.hypot(h.x - pt.x, h.y - pt.y) < CONFIG.HEAD_RADIUS + CONFIG.BODY_RADIUS - 2) {
            return true;
          }
        }
      }
      return false;
    }

    function checkAICollision(heads, aiSnakes) {
      for (const ai of aiSnakes) {
        if (!ai.alive) continue;
        for (const pt of ai.trail) {
          for (const h of heads) {
            if (Math.hypot(h.x - pt.x, h.y - pt.y) < CONFIG.HEAD_RADIUS + CONFIG.BODY_RADIUS - 2) {
              return true;
            }
          }
        }
      }
      return false;
    }

    // ── Rendering ──────────────────────────────────────────────────────────────
    function drawArena() {
      ctx.fillStyle = CONFIG.COLORS.ARENA;
      ctx.fillRect(0, 0, W, H);

      // Subtle grid
      ctx.strokeStyle = 'rgba(15, 52, 96, 0.3)';
      ctx.lineWidth = 0.5;
      const GRID = 50;
      for (let x = GRID; x < W; x += GRID) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = GRID; y < H; y += GRID) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      // Wall border
      ctx.strokeStyle = CONFIG.COLORS.WALL;
      ctx.lineWidth = CONFIG.ARENA_PAD * 2;
      ctx.strokeRect(0, 0, W, H);
    }

    function drawTrail(trail, color, radius) {
      if (trail.length < 2) return;
      ctx.strokeStyle = color;
      ctx.lineWidth = radius * 2;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(trail[0].x, trail[0].y);
      for (let i = 1; i < trail.length; i++) {
        ctx.lineTo(trail[i].x, trail[i].y);
      }
      ctx.stroke();
    }

    function drawEyes(hx, hy, angle, r) {
      const ec = Math.cos(angle);
      const es = Math.sin(angle);
      const offset = r * 0.45;
      const eyeR = r * 0.28;

      const positions = [
        { x: hx + ec * offset * 0.5 - es * offset, y: hy + es * offset * 0.5 + ec * offset },
        { x: hx + ec * offset * 0.5 + es * offset, y: hy + es * offset * 0.5 - ec * offset },
      ];

      for (const pos of positions) {
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, eyeR, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#111';
        ctx.beginPath();
        ctx.arc(pos.x + ec * eyeR * 0.4, pos.y + es * eyeR * 0.4, eyeR * 0.55, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawPlayerHead(snake) {
      const heads = getHeads(snake);
      const cos = Math.cos(snake.angle);
      const sin = Math.sin(snake.angle);

      ctx.save();

      // Draw the Y-shaped fork connectors
      ctx.strokeStyle = CONFIG.COLORS.PLAYER_BODY;
      ctx.lineWidth = CONFIG.BODY_RADIUS * 2;
      ctx.lineCap = 'round';
      for (const h of heads) {
        ctx.beginPath();
        ctx.moveTo(snake.x, snake.y);
        ctx.lineTo(h.x, h.y);
        ctx.stroke();
      }

      // Draw each head circle with glow
      const headColors = [CONFIG.COLORS.PLAYER_HEAD_C, CONFIG.COLORS.PLAYER_HEAD_S, CONFIG.COLORS.PLAYER_HEAD_S];
      heads.forEach((h, i) => {
        ctx.shadowColor = headColors[i];
        ctx.shadowBlur = 14;
        ctx.fillStyle = headColors[i];
        ctx.beginPath();
        ctx.arc(h.x, h.y, CONFIG.HEAD_RADIUS, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        drawEyes(h.x, h.y, snake.angle, CONFIG.HEAD_RADIUS);
      });

      ctx.restore();
    }

    function drawAIHead(ai) {
      const c = CONFIG.COLORS.AI_HEAD[ai.colorIndex];
      ctx.save();
      ctx.shadowColor = c;
      ctx.shadowBlur = 12;
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.arc(ai.x, ai.y, CONFIG.HEAD_RADIUS, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      drawEyes(ai.x, ai.y, ai.angle, CONFIG.HEAD_RADIUS);
      ctx.restore();
    }

    function drawFood() {
      const now = Date.now();
      for (const f of foods) {
        const pulse = Math.sin(now / 300 + f.pulsePhase) * 1.8;
        const r = 6 + pulse;
        const color = CONFIG.COLORS.FOOD[f.colorIndex];

        ctx.save();
        ctx.shadowColor = color;
        ctx.shadowBlur = 10;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(f.x, f.y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function render() {
      drawArena();
      drawFood();

      // AI snakes
      for (const ai of aiSnakes) {
        if (!ai.alive) continue;
        drawTrail(ai.trail, CONFIG.COLORS.AI_BODY[ai.colorIndex], CONFIG.BODY_RADIUS);
        drawAIHead(ai);
      }

      // Player
      if (player.alive) {
        drawTrail(player.trail, CONFIG.COLORS.PLAYER_BODY, CONFIG.BODY_RADIUS);
        drawPlayerHead(player);
      }
    }

    // ── HUD ────────────────────────────────────────────────────────────────────
    function updateHUD() {
      scoreEl.textContent = score;
      bestEl.textContent = highScore;
    }

    // ── Game logic ─────────────────────────────────────────────────────────────
    function onFoodEaten(indices) {
      // Remove in reverse order to keep indices valid
      indices.sort((a, b) => b - a);
      for (const fi of indices) {
        foods.splice(fi, 1);
        foods.push(spawnOnePellet());
        score++;
        player.pendingGrowth += CONFIG.GROWTH_PER_FOOD;
      }
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snake3_hi', highScore);
      }
      updateHUD();
    }

    function killPlayer() {
      player.alive = false;
      gameState = 'dead';
      overlayTitle.textContent = 'Game Over';
      overlaySubtitle.textContent = `Score: ${score}  |  Best: ${highScore}`;
      overlay.querySelector('.hint').textContent = 'Arrow keys or A/D to steer · Mouse to aim';
      playBtn.textContent = 'Play Again';
      overlay.style.display = 'flex';
    }

    function startGame() {
      score = 0;
      usesMouse = false;
      mouseAngle = 0;
      player = createPlayer();
      aiSnakes = Array.from({ length: CONFIG.AI_COUNT }, (_, i) => createAI(i));
      foods = spawnFood(CONFIG.FOOD_COUNT);
      overlay.style.display = 'none';
      gameState = 'running';
      updateHUD();
    }

    playBtn.addEventListener('click', startGame);

    // ── Game Loop ──────────────────────────────────────────────────────────────
    function gameLoop() {
      requestAnimationFrame(gameLoop);

      if (gameState !== 'running') {
        if (gameState === 'start') {
          // Draw animated background on start screen
          drawArena();
          drawFood();
        }
        return;
      }

      // Update
      updatePlayer();
      for (const ai of aiSnakes) updateAI(ai);

      // Food eaten by player
      const eaten = checkFoodCollision(player);
      if (eaten.length) onFoodEaten(eaten);

      // Food eaten by AI (they grow too)
      for (const ai of aiSnakes) {
        if (!ai.alive) continue;
        for (let fi = foods.length - 1; fi >= 0; fi--) {
          const f = foods[fi];
          if (Math.hypot(ai.x - f.x, ai.y - f.y) < CONFIG.HEAD_RADIUS + 7) {
            foods.splice(fi, 1);
            foods.push(spawnOnePellet());
            ai.pendingGrowth += CONFIG.GROWTH_PER_FOOD;
          }
        }
      }

      // Collision checks — player death
      const heads = getHeads(player);
      if (
        checkWall(player) ||
        checkSelfCollision(player) ||
        checkAICollision(heads, aiSnakes)
      ) {
        killPlayer();
        return;
      }

      // AI wall death (respawn them)
      for (const ai of aiSnakes) {
        if (!ai.alive) continue;
        if (checkWall(ai)) {
          const sp = AI_SPAWNS[ai.colorIndex];
          const newAI = createAI(ai.colorIndex);
          Object.assign(ai, newAI);
        }
      }

      render();
    }

    // Initial background render on start screen
    foods = spawnFood(CONFIG.FOOD_COUNT);
    player = createPlayer(); // dummy for mouse tracking during start
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
