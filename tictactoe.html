<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.5em;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x {
      color: #e94560;
    }

    .cell.o {
      color: #a8dadc;
    }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 16px rgba(168, 218, 220, 0.5);
    }

    #restart {
      margin-top: 2rem;
      padding: 0.7rem 2rem;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.15s, transform 0.1s;
    }

    #restart:hover {
      background: #c73652;
      transform: scale(1.04);
    }

    #score {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
    }

    .score-box .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.7;
    }

    .score-box .value {
      font-size: 1.5rem;
      font-weight: bold;
    }

    #score .score-box:nth-child(1) .value { color: #e94560; }
    #score .score-box:nth-child(2) .value { color: #aaa; }
    #score .score-box:nth-child(3) .value { color: #a8dadc; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="score">
    <div class="score-box">
      <div class="label">X</div>
      <div class="value" id="score-x">0</div>
    </div>
    <div class="score-box">
      <div class="label">Draws</div>
      <div class="value" id="score-d">0</div>
    </div>
    <div class="score-box">
      <div class="label">O</div>
      <div class="value" id="score-o">0</div>
    </div>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="restart">Restart</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, scores;

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      document.querySelectorAll('.cell').forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      setStatus("X's turn");
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(Boolean)) return { winner: null, draw: true };
      return null;
    }

    function updateScores(result) {
      if (result.winner === 'X') scores.x++;
      else if (result.winner === 'O') scores.o++;
      else scores.d++;
      document.getElementById('score-x').textContent = scores.x;
      document.getElementById('score-o').textContent = scores.o;
      document.getElementById('score-d').textContent = scores.d;
    }

    document.getElementById('board').addEventListener('click', e => {
      const cell = e.target.closest('.cell');
      if (!cell || gameOver || cell.classList.contains('taken')) return;

      const i = parseInt(cell.dataset.i);
      board[i] = current;
      cell.textContent = current;
      cell.classList.add('taken', current.toLowerCase());

      const result = checkWinner();
      if (result) {
        gameOver = true;
        updateScores(result);
        if (result.winner) {
          result.line.forEach(idx =>
            document.querySelector(`[data-i="${idx}"]`).classList.add('win')
          );
          setStatus(`${result.winner} wins!`);
        } else {
          setStatus("It's a draw!");
        }
        return;
      }

      current = current === 'X' ? 'O' : 'X';
      setStatus(`${current}'s turn`);
    });

    document.getElementById('restart').addEventListener('click', init);

    scores = { x: 0, o: 0, d: 0 };
    init();
  </script>
</body>
</html>
